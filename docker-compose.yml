services:
  postgres:
    image: postgres:16
    container_name: grid_carbon_postgres
    environment:
      POSTGRES_USER: grid_user
      POSTGRES_PASSWORD: grid_password
      POSTGRES_DB: grid_carbon
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grid_user -d grid_carbon"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: